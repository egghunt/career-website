<!DOCTYPE html>
<html>

<head>

<title>สอบถาม</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f1f5f9;
text-align:center;
}

h1{
background:#2563eb;
color:white;
padding:20px;
}

.form-box{
background:white;
width:500px;
margin:40px auto;
padding:30px;
border-radius:12px;
box-shadow:0 6px 15px rgba(0,0,0,0.2);
}

input,textarea{
width:100%;
padding:12px;
margin:10px 0;
border-radius:8px;
border:1px solid #ccc;
}

button{
padding:12px 25px;
border:none;
background:#2563eb;
color:white;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#1e40af;
}

</style>

</head>

<body>

<h1>📩 ติดต่อสอบถาม</h1>

<div class="form-box">

<form action="https://formsubmit.co/egggeggg80@gmail.com" method="POST">

<input type="text" name="name" placeholder="ชื่อของคุณ" required>

<input type="email" name="email" placeholder="อีเมลของคุณ" required>

<textarea name="message" placeholder="พิมพ์คำถาม..." required></textarea>

<button type="submit">ส่งข้อความ</button>

</form>

</div>

</body>

</html>
